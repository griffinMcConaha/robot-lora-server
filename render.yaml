services:
  - type: web
    name: robot-lora-server
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ROBOT_LORA_DATA_DIR
        value: /var/data
      - key: APP_API_KEY
        sync: false
      - key: BOARD_API_KEY
        sync: false
      - key: SUPERVISION_TELEMETRY_STALE_MS
        value: 15000
      - key: MAX_INPUT_AREA_CELLS
        value: 60000
    disks:
      - name: robot-lora-data
        mountPath: /var/data
        sizeGB: 1
